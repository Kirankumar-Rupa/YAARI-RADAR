<!DOCTYPE html>
<html>
<head>
    <title>Campus Transport Portal</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        body { margin:0; font-family: Arial; }
        .container { display:flex; height:100vh; }

        .sidebar {
            width:300px;
            background:#1e1e2f;
            color:white;
            padding:20px;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .sidebar select, .sidebar button {
            padding:8px;
            border-radius:5px;
            border:none;
        }

        .sidebar button {
            background:#15c8ce;
            cursor:pointer;
        }

        #map { flex:1; }
    </style>
</head>

<body>
<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Route Planner</h3>

        <label>Pickup</label>
        <select id="pickup"></select>

        <label>Drop</label>
        <select id="drop"></select>

        <button onclick="findRoute()">Find Route</button>
    </div>

    <!-- Map -->
    <div id="map"></div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
// Initialize map
const map = L.map('map').setView([17.983, 79.531], 16);

// Base layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Current location
navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    if(window.userMarker){
        userMarker.setLatLng([lat,lng]);
    } else {
        window.userMarker = L.marker([lat,lng]).addTo(map)
            .bindPopup("You are here");
    }
});

let buildings = {};
let routingControl;

// Load boundary
fetch('data/boundary.geojson')
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{style:{color:'red'}}).addTo(map);
});

// Load roads
fetch('data/roads.geojson')
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{style:{color:'black'}}).addTo(map);
});

// Load buildings + dropdown
fetch('data/buildings.geojson')
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:{color:'#15c8ce'},
        onEachFeature:(f,l)=>{
            const name = f.properties.name;
            const center = l.getBounds().getCenter();

            buildings[name] = center;

            pickup.innerHTML += `<option value="${name}">${name}</option>`;
            drop.innerHTML += `<option value="${name}">${name}</option>`;
        }
    }).addTo(map);
});

// Routing
function findRoute(){
    const p = pickup.value;
    const d = drop.value;

    if(!p || !d){ alert("Select both"); return; }

    if(routingControl) map.removeControl(routingControl);

    routingControl = L.Routing.control({
        waypoints:[
            L.latLng(buildings[p]),
            L.latLng(buildings[d])
        ],
        routeWhileDragging:false,
        show:false
    }).addTo(map);
}

// Vehicle icon
const vehicleIcon = L.icon({
    iconUrl:'icons/yaari.png',
    iconSize:[30,30]
});

const vehicles = {};

// Dummy live vehicle simulation
setInterval(()=>{
    const id = "Vehicle-1";
    const lat = 17.983 + (Math.random()-0.5)*0.002;
    const lng = 79.531 + (Math.random()-0.5)*0.002;

    if(vehicles[id]){
        vehicles[id].setLatLng([lat,lng]);
    } else {
        vehicles[id] = L.marker([lat,lng],{icon:vehicleIcon})
        .addTo(map)
        .bindPopup(id);
    }
},3000);

/* ================= FIREBASE (OPTIONAL) =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

onSnapshot(collection(db, "vehicle_locations"), snap=>{
    snap.forEach(doc=>{
        const d = doc.data();
        const id = doc.id;

        if(vehicles[id]){
            vehicles[id].setLatLng([d.lat,d.lng]);
        } else {
            vehicles[id] = L.marker([d.lat,d.lng],{icon:vehicleIcon}).addTo(map);
        }
    });
});
==================================================== */

</script>
</body>
</html>
